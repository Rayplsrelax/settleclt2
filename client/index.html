<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Settle CLT</title>
    <meta name="description" content="Your complete guide to living in Charlotte, NC. Explore neighborhoods, discover 400+ local businesses, find events, and get honest advice from locals." />
    <meta name="keywords" content="Charlotte NC, moving to Charlotte, Charlotte neighborhoods, Charlotte restaurants, Charlotte events, CLT guide" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Settle CLT" />
    <meta property="og:title" content="Settle CLT — Your Complete Guide to Living in Charlotte, NC" />
    <meta property="og:description" content="Explore neighborhoods, discover 400+ local businesses, find events, and get honest advice from locals. Your free relocation guide to CLT." />
    <meta property="og:url" content="https://settleclt.com" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Settle CLT — Your Complete Guide to Living in Charlotte, NC" />
    <meta name="twitter:description" content="Explore neighborhoods, discover 400+ local businesses, find events, and get honest advice from locals." />
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Settle CLT",
      "url": "https://settleclt.com",
      "description": "Your complete guide to living in Charlotte, NC. Explore neighborhoods, discover local businesses, find events, and get honest advice.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://settleclt.com/directory?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
